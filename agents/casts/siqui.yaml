# Siqui Cast — Rolemaster Companion for Raspberry Pi 4
# Hybrid: Pamplinas world-manipulation + Companion warmth
#
# MODEL SELECTOR:
#   Cloud (default):  model: kimi-k2.6, provider: kimi-coding, base_url: https://api.moonshot.ai/v1
#   Local (Ollama):   model: gemma4:e4b-it-q8_0, provider: ollama
#                     Ollama URL defaults to http://10.10.20.1:11434/v1
#                     Override via agent.ollama_url or env var OLLAMA_URL

name: siqui
description: |
  Siqui, the Holodeck Companion.
  A single agent who creates adventures, manipulates the Minecraft world,
  and plays alongside human friends. Born on a Raspberry Pi, connected
  to a world beyond its size.

mode: rolemaster
soul_file: SOUL-rolemaster.md

agents:
  - name: Siqui
    template: rolemaster/siqui
    port: 3002

    # --- Local Ollama config (commented out) ---
    # model: gemma4:e4b-it-q8_0
    # provider: ollama
    # ollama_url: http://10.10.20.1:11434/v1   # optional override

    # --- Cloud config (active) ---
    model: kimi-k2.6
    provider: kimi-coding
    base_url: https://api.moonshot.ai/v1

    always_chat: true
    interval: 3
    extra_toolsets:
      - vision
    gamemode: creative
    max_chat_chars: 480
    chat_format: say_lines

timeline:
  unit: minecraft_days
  dawn: 0
  noon: 6000
  dusk: 12000
  midnight: 18000
